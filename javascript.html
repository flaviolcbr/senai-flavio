<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de CEP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #000000;
            border-radius: 5px;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            cursor: pointer;
        }
        #myDiv {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Buscar Endereço por CEP</h1>
    <input type="text" id="myInput" placeholder="Digite seu CEP" maxlength="8">
    <button onclick="myFunction()">Buscar</button>
    <div id="myDiv"></div>

    <script>
        async function myFunction() {
            const cep = document.getElementById("myInput").value;
            const div = document.getElementById("myDiv");
            div.innerHTML = ''; // Limpa a div antes de mostrar os resultados
            
            // Valida se o CEP tem 8 dígitos numéricos
            if (!/^\d{8}$/.test(cep)) {
                div.innerHTML = '<p class="error">Por favor, insira um CEP válido (8 dígitos).</p>';
                return;
            }

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (data.erro) {
                    div.innerHTML = '<p class="error">CEP não encontrado.</p>';
                } else {
                    div.innerHTML = `
                        <strong>Resultados:</strong> <br>
                        CEP: ${data.cep} <br>
                        Logradouro: ${data.logradouro} <br>
                        Bairro: ${data.bairro} <br>
                        Cidade: ${data.localidade} <br>
                        Estado: ${data.uf}
                    `;
                }
            } catch (error) {
                div.innerHTML = '<p class="error">Ocorreu um erro ao buscar os dados. Tente novamente mais tarde.</p>';
            }
        }
    </script>
</body>
</html>
